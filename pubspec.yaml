name: geo_connect
description: "a proximity-based marketplace that connects local farmers and nearby consumers using geolocation"

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  http: ^1.6.0
  permission_handler: ^12.0.1
  supabase_flutter: ^2.12.0
  provider: ^6.1.5+1
  image_picker: ^1.2.1
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.4.1


  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0


flutter:


  uses-material-design: true
  assets:
    - assets/Images/
    - .env
